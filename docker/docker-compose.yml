services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-restaurant_decision}"
      POSTGRES_USER: "${POSTGRES_USER:-app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-app}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-restaurant_decision}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../.env
    environment:
      APP_ENV: "docker"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-restaurant_decision}"
      DATABASE_AUTO_SEED: "${DATABASE_AUTO_SEED:-true}"
      BACKEND_HOST: "${BACKEND_HOST:-0.0.0.0}"
      BACKEND_PORT: "${BACKEND_PORT:-8000}"
      LLM_PROVIDER: "${LLM_PROVIDER:-stub}"
      LLM_MODEL_NAME: "${LLM_MODEL_NAME:-stub-chat-model}"
      LLM_TEMPERATURE: "${LLM_TEMPERATURE:-0.0}"
      LLM_MAX_TOKENS: "${LLM_MAX_TOKENS:-256}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      CHAT_SYSTEM_PROMPT: "${CHAT_SYSTEM_PROMPT:-You are a concise assistant inside the AI Restaurant Decision Assistant backend. Answer directly and keep the response grounded in the conversation.}"
      STUB_LLM_RESPONSE_PREFIX: "${STUB_LLM_RESPONSE_PREFIX:-Stub reply: }"
      STUB_LLM_DEFAULT_REPLY: "${STUB_LLM_DEFAULT_REPLY:-Hello from the stub model.}"
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - ../.env
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    depends_on:
      - backend

volumes:
  postgres_data:
